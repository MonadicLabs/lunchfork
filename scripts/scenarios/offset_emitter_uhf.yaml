name: "Off-centre emitter UHF — UAV orbit bias test"
# Emitter is placed 1.5km away from the orbit centre.
# Tests whether the PF can recover from a biased initial prior
# and converge to an off-centre location.
# The orbit geometry is less optimal for this emitter position.
duration_sec: 600

emitters:
  - id: target-1
    lat: 43.548    # ~2km north of orbit centre
    lon: 5.472
    alt_m: 5
    freq_hz: 433920000
    power_dbm: 10
    trajectory: static

nodes:
  - id: uav-1
    type: uav
    trajectory:
      type: orbit
      center_lat: 43.530   # Centre is offset from emitter
      center_lon: 5.450
      radius_m: 900
      alt_m: 120
      period_sec: 120
      helix: false

  - id: ground-1
    type: ground
    lat: 43.510
    lon: 5.430
    alt_m: 180

  - id: ground-2
    type: ground
    lat: 43.560
    lon: 5.490
    alt_m: 200

eval:
  ground_truth_emitter: target-1
  metrics: [rmse_m, cep50, cep90, convergence_time_sec]
  convergence_threshold_m: 300
