name: "UAV orbit UHF 433MHz"
duration_sec: 600
terrain_bbox: [4.5, 43.4, 5.2, 43.8]

emitters:
  - id: target-1
    lat: 43.530
    lon: 5.450
    alt_m: 5
    freq_hz: 433920000
    power_dbm: 10
    trajectory: static

nodes:
  - id: uav-1
    type: uav
    trajectory:
      type: orbit
      center_lat: 43.535
      center_lon: 5.455
      radius_m: 800
      alt_m: 120
      period_sec: 120
      helix: false

  - id: ground-1
    type: ground
    lat: 43.510
    lon: 5.430
    alt_m: 180

  - id: ground-2
    type: ground
    lat: 43.560
    lon: 5.490
    alt_m: 200

eval:
  ground_truth_emitter: target-1
  metrics: [rmse_m, cep50, cep90, convergence_time_sec]
  convergence_threshold_m: 200
