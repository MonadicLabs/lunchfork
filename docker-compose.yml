version: "3.9"

networks:
  lunchfork:
    driver: bridge

volumes:
  mosquitto-data:

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./deploy/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    networks:
      - lunchfork
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping", "-q", "0"]
      interval: 10s
      timeout: 5s
      retries: 3

  sim-engine:
    build:
      context: .
      dockerfile: containers/sim-engine/Dockerfile
    ports:
      - "9000:9000"
    volumes:
      - ./shared:/app/shared:ro
      - ./data/terrain:/app/data/terrain
    environment:
      PROPAGATION_MODEL: ${PROPAGATION_MODEL:-friis}
      TERRAIN_CACHE_DIR: /app/data/terrain
      ITM_CLIMATE: "5"
      ITM_PERMITTIVITY: "15"
      ITM_CONDUCTIVITY: "0.005"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
      # Default simulated emitter (UHF 433 MHz, near orbit centre)
      EMITTER_ID: target-1
      EMITTER_LAT: "43.530"
      EMITTER_LON: "5.450"
      EMITTER_ALT_M: "5"
      EMITTER_FREQ_HZ: "433920000"
      EMITTER_POWER_DBM: "10"
    networks:
      - lunchfork
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  node-sitl-uav1:
    build:
      context: .
      dockerfile: containers/node-sitl/Dockerfile
    depends_on:
      mosquitto:
        condition: service_healthy
      sim-engine:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared:ro
    environment:
      COMM_TRANSPORT: mqtt
      COMM_BROKER_URL: mqtt://mosquitto:1883
      NODE_ID: sim-uav-1
      NODE_TYPE: uav
      TRAJECTORY_TYPE: orbit
      TRAJECTORY_ORBIT_LAT: "43.535"
      TRAJECTORY_ORBIT_LON: "5.455"
      TRAJECTORY_ORBIT_RADIUS_M: "800"
      TRAJECTORY_ORBIT_ALT_M: "120"
      TRAJECTORY_ORBIT_PERIOD_SEC: "120"
      TRAJECTORY_ORBIT_HELIX: "false"
      SIMENGINE_URL: http://sim-engine:9000
      UPDATE_RATE_HZ: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - lunchfork
    restart: unless-stopped

  node-sitl-ground1:
    build:
      context: .
      dockerfile: containers/node-sitl/Dockerfile
    depends_on:
      mosquitto:
        condition: service_healthy
      sim-engine:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared:ro
    environment:
      COMM_TRANSPORT: mqtt
      COMM_BROKER_URL: mqtt://mosquitto:1883
      NODE_ID: sim-ground-1
      NODE_TYPE: ground
      TRAJECTORY_TYPE: static
      TRAJECTORY_ORBIT_LAT: "43.510"
      TRAJECTORY_ORBIT_LON: "5.430"
      TRAJECTORY_ORBIT_RADIUS_M: "0"
      TRAJECTORY_ORBIT_ALT_M: "180"
      TRAJECTORY_ORBIT_PERIOD_SEC: "120"
      TRAJECTORY_ORBIT_HELIX: "false"
      SIMENGINE_URL: http://sim-engine:9000
      UPDATE_RATE_HZ: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - lunchfork
    restart: unless-stopped

  node-sitl-ground2:
    build:
      context: .
      dockerfile: containers/node-sitl/Dockerfile
    depends_on:
      mosquitto:
        condition: service_healthy
      sim-engine:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared:ro
    environment:
      COMM_TRANSPORT: mqtt
      COMM_BROKER_URL: mqtt://mosquitto:1883
      NODE_ID: sim-ground-2
      NODE_TYPE: ground
      TRAJECTORY_TYPE: static
      TRAJECTORY_ORBIT_LAT: "43.560"
      TRAJECTORY_ORBIT_LON: "5.490"
      TRAJECTORY_ORBIT_RADIUS_M: "0"
      TRAJECTORY_ORBIT_ALT_M: "200"
      TRAJECTORY_ORBIT_PERIOD_SEC: "120"
      TRAJECTORY_ORBIT_HELIX: "false"
      SIMENGINE_URL: http://sim-engine:9000
      UPDATE_RATE_HZ: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - lunchfork
    restart: unless-stopped

  master:
    build:
      context: .
      dockerfile: containers/master/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared:ro
      - ./data/terrain:/app/data/terrain
      - ./data/checkpoints:/app/data/checkpoints:ro
    environment:
      COMM_TRANSPORT: mqtt
      COMM_BROKER_URL: mqtt://mosquitto:1883
      INFERENCE_BACKEND: ${INFERENCE_BACKEND:-onnx-cpu}
      MODEL_DIFFUSION_PATH: data/checkpoints/diffusion_vhf_v1.onnx
      MODEL_SR_PATH: data/checkpoints/sr_vhf_v1.onnx
      # MODEL_UNET_PATH: data/checkpoints/unet_itm_provence_v3.onnx  # ITM Provence — enable with PROPAGATION_MODEL=itm
      TERRAIN_CACHE_DIR: /app/data/terrain
      TERRAIN_PREFER: ${TERRAIN_PREFER:-srtm}
      GRID_COARSE_SIZE: "64"
      GRID_FINE_SIZE: "64"
      COARSE_SEARCH_RADIUS_M: "3000"
      SR_FACTOR: "4"
      ZOOM_TRIGGER_STD_M: "500"
      PF_N_PARTICLES: "500"
      PF_MOTION_MODEL: constant_velocity
      PF_ADAPTIVE_MOTION: "true"
      SLIDING_WINDOW_SEC: "30"
      SLIDING_WINDOW_ADAPTIVE: "true"
      FREQ_CLUSTER_BW_HZ: "25000"
      FREQ_CLUSTER_THRESHOLD_DBM: "-90"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - lunchfork
    restart: unless-stopped
